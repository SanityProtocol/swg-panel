name: docker

# Build the panel + node images and publish them to GHCR (ghcr.io/<owner>/swg-panel,
# ghcr.io/<owner>/swg-node) so users can PULL prebuilt multi-arch images instead of
# building locally — no Docker Hub account and no Docker Hub pull-rate limit.
# After the first run, make the two packages public once (repo → Packages → Settings).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # one image failing must not cancel the other's build/push
      matrix:
        include:
          - image: swg-panel
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64   # pure Python — multi-arch is free
          - image: swg-node
            dockerfile: Dockerfile.node
            platforms: linux/amd64               # compiles amneziawg-go/-tools; arm64 under QEMU is unreliable
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
