<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Mount point. Served at "/" by default; the panel rewrites this to the subpath
     (e.g. /swg/) when SWG_PANEL_BASE is set, so all relative URLs resolve correctly. -->
<base href="/">
<title>swgPanel</title>
<!-- inline SVG favicon (the cyan indicator-LED mark); offline-safe, no extra request -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231FC8D6'/%3E%3Ccircle cx='16' cy='14.5' r='5.5' fill='%230A0E15'/%3E%3C/svg%3E">
<link rel="stylesheet" href="app.css">
<!-- Set the light/dark theme before first paint so there's no dark→light flash. Mirrors app.js's
     resolvedTheme(): stored mode (else "auto"), auto → prefers-color-scheme. -->
<script>(function(){try{var m=localStorage.getItem("swg-theme");if(["light","dark"].indexOf(m)<0)m=matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";document.documentElement.dataset.theme=m;}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
</head>
<body>
<header class="appbar">
  <a class="brand" href="#/" aria-label="Overview">
    <span class="brand-mark" aria-hidden="true"></span><span class="brand-name">swg<span>Panel</span></span>
  </a>
  <span class="appver" id="appver" aria-label="versions"></span>
  <nav class="tabs" id="tabs">
    <a href="#/" data-tab="overview">Overview</a>
    <a href="#/connections" data-tab="connections">Live</a>
    <a href="#/users" data-tab="users">Users</a>
    <a href="#/nodes" data-tab="nodes">Nodes</a>
    <a href="#/peers" data-tab="peers">Peers</a>
  </nav>
  <div class="appbar-right">
    <div class="livepill" id="livepill"></div>
    <span class="tport" id="host-tport" title="How this panel is deployed" hidden></span>
    <span class="updslot" id="updslot"></span>
    <button class="iconbtn lg" id="vaultlock-btn" title="Lock encryption key" aria-label="Lock encryption key" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </button>
    <button class="iconbtn lg" id="theme-btn" title="Theme" aria-label="Theme"></button>
    <a class="iconbtn lg" id="panel-settings-btn" href="#/panel/settings" title="Panel settings" aria-label="Panel settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
    <div class="acct-wrap">
      <button class="iconbtn lg" id="acct-btn" title="Log out" aria-label="Log out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M15 17l5-5-5-5M20 12H9M11 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5"/></svg>
      </button>
    </div>
  </div>
</header>

<main id="view" class="view"></main>

<div id="overlay" class="overlay" aria-hidden="true"><div class="sheet" id="sheet" role="dialog" aria-modal="true"></div></div>
<div id="toasts" class="toasts" aria-live="polite"></div>

<!-- qrcode is a UMD lib: load as a classic script so it sets the global `qrcode`. -->
<script src="vendor/qrcode.js"></script>
<!-- shared turn-proxy client-config builders (window.SWGTurn) — one copy for the app + the subscription page. -->
<script src="turn-artifacts.js"></script>
<!-- Buildless: vendored Preact + htm as ESM, resolved via an import map. No bundler,
     no npm tree shipped — edit app.js and reload. Bare specifiers below resolve
     against <base href>, so they keep working under SWG_PANEL_BASE subpaths too. -->
<script type="importmap">
{ "imports": {
    "preact": "./vendor/preact.module.js",
    "preact/hooks": "./vendor/hooks.module.js",
    "htm": "./vendor/htm.module.js"
} }
</script>
<script type="module" src="app.js"></script>
</body>
</html>
