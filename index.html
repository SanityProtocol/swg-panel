<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Mount point. Served at "/" by default; the panel rewrites this to the subpath
     (e.g. /swg/) when SWG_PANEL_BASE is set, so all relative URLs resolve correctly. -->
<base href="/">
<title>swg-panel</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<header class="appbar">
  <a class="brand" href="#/" aria-label="Overview">
    <span class="brand-mark" aria-hidden="true"></span><span class="brand-name">swg<span>panel</span></span>
  </a>
  <span class="appver" id="appver" aria-label="versions"></span>
  <nav class="tabs" id="tabs">
    <a href="#/" data-tab="overview">Overview</a>
    <a href="#/nodes" data-tab="nodes">Nodes</a>
    <a href="#/peers" data-tab="peers">Peers</a>
    <a href="#/users" data-tab="users">Users</a>
    <a href="#/account" data-tab="account">Account</a>
  </nav>
  <div class="appbar-right">
    <div class="livepill" id="livepill" title="Users online now"><span class="dot"></span><b id="kpi-online">—</b> online</div>
    <button class="btn btn-primary" id="add-peer-btn"><span class="plus">+</span> Add peer</button>
  </div>
</header>

<main id="view" class="view"></main>

<div id="overlay" class="overlay" aria-hidden="true"><div class="sheet" id="sheet" role="dialog" aria-modal="true"></div></div>
<div id="toasts" class="toasts" aria-live="polite"></div>

<!-- qrcode is a UMD lib: load as a classic script so it sets the global `qrcode`. -->
<script src="vendor/qrcode.js"></script>
<!-- Buildless: vendored Preact + htm as ESM, resolved via an import map. No bundler,
     no npm tree shipped — edit app.js and reload. Bare specifiers below resolve
     against <base href>, so they keep working under SWG_PANEL_BASE subpaths too. -->
<script type="importmap">
{ "imports": {
    "preact": "./vendor/preact.module.js",
    "preact/hooks": "./vendor/hooks.module.js",
    "htm": "./vendor/htm.module.js"
} }
</script>
<script type="module" src="app.js"></script>
</body>
</html>
