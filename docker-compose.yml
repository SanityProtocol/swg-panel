# swg-panel — Docker. Copy .env.example to .env and fill it, then pick a profile:
#
#   Panel + local node:     docker compose --profile master up -d
#   Panel only:             docker compose --profile host up -d
#   Node only:              docker compose --profile node up -d
#
# The profiles match the installer's roles (master / host / node). install-docker.sh
# exposes two entry points (`docker host` / `docker node`) and asks the role in Step 1 —
# the `master` role brings up the master profile AND auto-enrolls the local node (no manual
# NODE_TOKEN). By hand: create each node in the panel's Nodes screen to get its NODE_TOKEN.
# Nodes reach the panel over OUTBOUND HTTPS. For master, set PANEL_URL=https://swg-panel:8443
# (the panel's service name on the compose network). (`host-node` is kept as an alias of
# `master` for older installs.)
services:
  swg-panel:
    # Pulls the prebuilt multi-arch image from GHCR (no local build, no Docker Hub limit).
    # To build from source instead, comment `image:` and uncomment the `build:` block.
    image: ghcr.io/sanityprotocol/swg-panel:latest
    # build: .
    pull_policy: ${PULL_POLICY:-missing}
    container_name: swg-panel
    restart: unless-stopped
    profiles: ["host", "master", "host-node"]
    ports:
      - "${PANEL_PORT:-443}:8443"         # host-published port → container's 8443
      # host port 80 (Let's Encrypt HTTP-01) is added by docker-compose.override.yml, which the
      # installer writes ONLY for TLS=letsencrypt(-ip) — so other TLS methods don't clash with nginx/apache on :80.
    environment:
      PANEL_USER: "${PANEL_USER:-admin}"
      PANEL_PASSWORD: "${PANEL_PASSWORD:?set PANEL_PASSWORD in .env}"
      PANEL_DOMAIN: "${PANEL_DOMAIN:-localhost}"
      # TLS is issued INSIDE the container by the bundled acme.sh — same options as bare-metal:
      #   letsencrypt | letsencrypt-ip | cloudflare | cf15 | selfsigned | none   (or mount a real cert below)
      TLS: "${TLS:-selfsigned}"
      ACME_EMAIL: "${ACME_EMAIL:-}"       # letsencrypt/cloudflare account email
      CF_TOKEN: "${CF_TOKEN:-}"           # cloudflare DNS-01: token with Zone:DNS:Edit + Zone:Read
      CF_ORIGIN_TOKEN: "${CF_ORIGIN_TOKEN:-}"  # cf15: token with Zone:SSL and Certificates:Edit
      SWG_PANEL_BASE: "${PANEL_BASE:-}"   # optional subpath mount, e.g. /swg (blank = root)
      SWG_UPDATE_TRIGGER: "${SWG_UPDATE_TRIGGER:-}"   # set by install-docker when it wires the host one-click updater (swg-update.path watches data/lib/.update-request); blank = manual update only
      SWG_HOST_HOSTNAME: "${SWG_HOST_HOSTNAME:-}"     # the HOST's hostname (install-docker sets it) — lets the panel recognise a master's co-located node, which reports the host hostname via host-networking (the panel container's own hostname is a random id)
    volumes:
      - ./data/etc:/etc/swg-panel         # fleet.json + nodes.json + auth + tls/ + acme/ persist here
      - ./data/lib:/var/lib/swg-panel     # roster (users.json), node store, stored configs
      - ./data/stats:/var/www/wgstats     # status snapshots (fed by node syncs)
      # --- mount a real cert instead of self-signed (e.g. a Cloudflare Origin cert) ---
      # - ./tls/fullchain.pem:/etc/swg-panel/tls/fullchain.pem:ro
      # - ./tls/key.pem:/etc/swg-panel/tls/key.pem:ro

  # The public subscription surface. A SEPARATE container that serves per-user QR/config pages at
  # https://sub.<domain>/<token>#<unlock-key>. It reuses the panel image (swg-sub is pure stdlib —
  # no separate build) but runs its own read-only process: the state volumes are mounted `:ro`, it
  # bypasses the panel entrypoint, and it holds no login/write/node code. So a compromise of this
  # internet-facing surface yields only ciphertext (the unlock key rides in the URL fragment and
  # never reaches the server), never the fleet. OFF until you enable it in Settings → Subscriptions.
  swg-sub:
    image: ghcr.io/sanityprotocol/swg-panel:latest
    # build: .
    pull_policy: ${PULL_POLICY:-missing}
    container_name: swg-sub
    restart: unless-stopped
    profiles: ["host", "master", "host-node"]     # runs wherever the panel runs
    depends_on: ["swg-panel"]
    entrypoint: ["/opt/swg-panel/swg-sub"]        # NOT the panel entrypoint — no acme/fleet-write, just serve
    ports:
      - "${SUB_PORT:-8444}:8444"                  # host-published → container's 8444 (front with your reverse proxy)
    environment:
      SWG_SUB_FLEET: /etc/swg-panel/fleet.json    # locate the same state files the panel wrote
      SWG_SUB_WEB: /opt/swg-panel                 # sub.html/sub.js/sub.css + vendor/qrcode.js live here in the image
      SWG_SUB_HOST: "0.0.0.0"
      SWG_SUB_PORT: "8444"
      # Plain HTTP by default — terminate TLS at your reverse proxy / Cloudflare, or reuse the panel's
      # cert by setting serve.cert_path=/etc/swg-panel/tls/fullchain.pem (+ key_path) in the panel.
    volumes:
      - ./data/etc:/etc/swg-panel:ro              # fleet.json (paths) — read-only
      - ./data/lib:/var/lib/swg-panel:ro          # roster + nodes + subs (token map / blobs / serve.json) — READ-ONLY
      - ./data/stats:/var/www/wgstats:ro          # node snapshot mirrors (endpoint / server pubkey / awg params)
      # Defence-in-depth: mask the secrets this public surface must never read (containers run as root,
      # so :ro alone wouldn't stop a compromise from opening them). swg-sub reads NONE of these — it takes
      # its config from subs/serve.json. /dev/null masks a file; tmpfs masks a directory.
      - /dev/null:/etc/swg-panel/auth:ro                      # the panel login hash
      - /dev/null:/var/lib/swg-panel/panel-settings.json:ro   # webhook signing secrets / API token hashes
      - /dev/null:/var/lib/swg-panel/subs/vault.json:ro       # the subscription-key vault (SK → every peer's key)
      - /dev/null:/var/lib/swg-panel/subs/escrow.json:ro      # the SK-wrapped per-user unlock keys + tokens
    tmpfs:
      - /etc/swg-panel/tls        # the panel's TLS PRIVATE KEY — never hand it to the internet-facing surface
      - /var/lib/swg-panel/configs   # stored client configs (if store_configs is ever on)

  swg-node:
    # Prebuilt image from GHCR. To build the userspace AmneziaWG datapath from source
    # instead, comment `image:` and uncomment the `build:` block.
    image: ghcr.io/sanityprotocol/swg-node:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.node
    pull_policy: ${PULL_POLICY:-missing}
    container_name: swg-node
    restart: unless-stopped
    profiles: ["node", "master", "host-node"]
    cap_add: ["NET_ADMIN"]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.route_localnet=1   # Force-DNS DNATs client :53 to loopback dnsmasq — needs this on (host-net drops this block; installer sets it on the host instead)
    ports:
      - "${NODE_LISTEN_PORT:-51820}:${NODE_LISTEN_PORT:-51820}/udp"   # the bootstrap interface's listen port
      # NOTE: the installer puts the node on `network_mode: host` for both the `node` and `master`
      # profiles (so every interface port — incl. panel-created ones — is reachable with no
      # publishing). These `ports:` only apply if you run the node on bridge networking instead;
      # then every ADDITIONAL interface's port must be published here too, e.g.:
      # - "51821:51821/udp"
      # To use host networking manually: drop this `ports:` list + the `sysctls:` above and add
      # `network_mode: host`. On a MASTER also point the node at the panel over loopback
      # (PANEL_URL=https://127.0.0.1:<published-port>, TLS_VERIFY=no), since `swg-panel` won't resolve.
    environment:
      PANEL_URL: "${PANEL_URL:?set PANEL_URL (master: https://swg-panel:8443)}"
      NODE_TOKEN: "${NODE_TOKEN:?create the node in the Nodes screen, then set NODE_TOKEN}"
      NODE_ENDPOINT: "${NODE_ENDPOINT:?public IP/host clients dial for this node}"
      NODE_NET: "${NODE_NET:-host}"        # host (this container uses network_mode: host) or bridge — reported to the panel so it shows port-publishing guidance only for bridge
      TURN_MANAGE: "${TURN_MANAGE:-manual}"  # panel = the installer mounted docker.sock so swg-noded can run turn-proxy CONTAINERS; manual = no socket
      SWG_TURN_IMAGE: "${SWG_TURN_IMAGE:-ghcr.io/sanityprotocol/swg-node:latest}"  # image swg-noded runs each turn-proxy container from
      SWG_HOST_NODE_DIR: "${SWG_HOST_NODE_DIR:-}"   # absolute HOST path of ./data/node — for bind-mounting the turn binary into its container
      SWG_TURN_MIRROR: "${SWG_TURN_MIRROR:-}"   # OPT-IN: space-separated GitHub proxy prefix(es) to fall back to if the direct release download fails (you must trust them to serve the right binary)
      # Single interface (default), or several via NODE_IFACES (see .env.example):
      NODE_IFACE: "${NODE_IFACE:-awg0}"
      NODE_IFACES: "${NODE_IFACES:-}"     # "name:port:addr[:proto[:endpoint]],…"  (blank = use NODE_IFACE)
      NODE_LISTEN_PORT: "${NODE_LISTEN_PORT:-51820}"
      NODE_ADDRESS: "${NODE_ADDRESS:-10.8.0.1/24}"
      NODE_MTU: "${NODE_MTU:-1280}"        # interface MTU; 1280 leaves headroom for turn-proxy obfuscation
      NODE_PLAIN_WG: "${NODE_PLAIN_WG:-}"  # yes = plain WireGuard; blank/no = AmneziaWG v2
      TLS_VERIFY: "${TLS_VERIFY:-yes}"    # verify the panel's cert by default; set no only for a self-signed panel
      DNS: "${DNS:-1.1.1.1}"
      SWG_UPDATE_TRIGGER: "${NODE_UPDATE_TRIGGER:-}"   # set by install-docker (node/master) when it wires the host one-click updater; swg-noded touches this on an Update request and the host swg-update.path runs `compose pull && up`. blank = manual update only
      # turn-proxies run as SIBLING CONTAINERS (swg-turn-*, via the mounted docker.sock) — NOT host
      # systemd. swg-noded keeps their config in this record under ./data/node (mounted below).
      SWG_TURN_RECORD: "/var/lib/swg-noded/turn-proxy.json"
    volumes:
      - ./data/node:/var/lib/swg-noded
      # Persist the interface .confs (server keys) so interfaces created from the panel — and the
      # bootstrap interface's keypair — survive a container recreate. Without this they'd be
      # regenerated/lost on every `up`.
      - ./data/node-confs:/etc/amnezia/amneziawg
      # Full AmneziaWG server conf(s) with your own obfuscation params. Every file
      # mounted under /etc/swg-node/*.conf becomes a managed interface:
      # - ./awg0.conf:/etc/swg-node/awg0.conf:ro
      # - ./wg1.conf:/etc/swg-node/wg1.conf:ro
