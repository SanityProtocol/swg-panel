# swg-panel — Docker. Copy .env.example to .env and fill it, then pick a profile:
#
#   Panel + local node:     docker compose --profile master up -d
#   Panel only:             docker compose --profile host up -d
#   Node only:              docker compose --profile node up -d
#
# The profiles match the installer's roles (master / host / node). install-docker.sh
# exposes two entry points (`docker host` / `docker node`) and asks the role in Step 1 —
# the `master` role brings up the master profile AND auto-enrolls the local node (no manual
# NODE_TOKEN). By hand: create each node in the panel's Nodes screen to get its NODE_TOKEN.
# Nodes reach the panel over OUTBOUND HTTPS. For master, set PANEL_URL=https://swg-panel:8443
# (the panel's service name on the compose network). (`host-node` is kept as an alias of
# `master` for older installs.)
services:
  swg-panel:
    # Pulls the prebuilt multi-arch image from GHCR (no local build, no Docker Hub limit).
    # To build from source instead, comment `image:` and uncomment the `build:` block.
    image: ghcr.io/sanityprotocol/swg-panel:latest
    # build: .
    pull_policy: ${PULL_POLICY:-missing}
    container_name: swg-panel
    restart: unless-stopped
    profiles: ["host", "master", "host-node"]
    ports:
      - "${PANEL_PORT:-443}:8443"         # host-published port → container's 8443
      - "80:80"                           # ONLY needed for TLS=letsencrypt (HTTP-01); harmless otherwise
    environment:
      PANEL_USER: "${PANEL_USER:-admin}"
      PANEL_PASSWORD: "${PANEL_PASSWORD:?set PANEL_PASSWORD in .env}"
      PANEL_DOMAIN: "${PANEL_DOMAIN:-localhost}"
      # TLS is issued INSIDE the container by the bundled acme.sh — same options as bare-metal:
      #   letsencrypt | cloudflare | cf15 | selfsigned | none   (or mount a real cert below)
      TLS: "${TLS:-selfsigned}"
      ACME_EMAIL: "${ACME_EMAIL:-}"       # letsencrypt/cloudflare account email
      CF_TOKEN: "${CF_TOKEN:-}"           # cloudflare DNS-01: token with Zone:DNS:Edit + Zone:Read
      CF_ORIGIN_TOKEN: "${CF_ORIGIN_TOKEN:-}"  # cf15: token with Zone:SSL and Certificates:Edit
      SWG_PANEL_BASE: "${PANEL_BASE:-}"   # optional subpath mount, e.g. /swg (blank = root)
    volumes:
      - ./data/etc:/etc/swg-panel         # fleet.json + nodes.json + auth + tls/ + acme/ persist here
      - ./data/lib:/var/lib/swg-panel     # roster (users.json), node store, stored configs
      - ./data/stats:/var/www/wgstats     # status snapshots (fed by node syncs)
      # --- mount a real cert instead of self-signed (e.g. a Cloudflare Origin cert) ---
      # - ./tls/fullchain.pem:/etc/swg-panel/tls/fullchain.pem:ro
      # - ./tls/key.pem:/etc/swg-panel/tls/key.pem:ro

  swg-node:
    # Prebuilt image from GHCR. To build the userspace AmneziaWG datapath from source
    # instead, comment `image:` and uncomment the `build:` block.
    image: ghcr.io/sanityprotocol/swg-node:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.node
    pull_policy: ${PULL_POLICY:-missing}
    container_name: swg-node
    restart: unless-stopped
    profiles: ["node", "master", "host-node"]
    cap_add: ["NET_ADMIN"]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "${NODE_LISTEN_PORT:-51820}:${NODE_LISTEN_PORT:-51820}/udp"   # the bootstrap interface's listen port
      # IMPORTANT: every ADDITIONAL interface — including ones you create from the panel — listens on
      # its own port, which must be published here too (then `docker compose up -d`), or clients can't
      # reach it (rx stays 0). e.g.:
      # - "51821:51821/udp"
      # Alternatively, for a STANDALONE node (not the master profile, which needs the swg-panel docker
      # DNS), drop this `ports:` list and add `network_mode: host` so every interface port just works.
    environment:
      PANEL_URL: "${PANEL_URL:?set PANEL_URL (master: https://swg-panel:8443)}"
      NODE_TOKEN: "${NODE_TOKEN:?create the node in the Nodes screen, then set NODE_TOKEN}"
      NODE_ENDPOINT: "${NODE_ENDPOINT:?public IP/host clients dial for this node}"
      # Single interface (default), or several via NODE_IFACES (see .env.example):
      NODE_IFACE: "${NODE_IFACE:-awg0}"
      NODE_IFACES: "${NODE_IFACES:-}"     # "name:port:addr[:proto[:endpoint]],…"  (blank = use NODE_IFACE)
      NODE_LISTEN_PORT: "${NODE_LISTEN_PORT:-51820}"
      NODE_ADDRESS: "${NODE_ADDRESS:-10.8.0.1/24}"
      NODE_MTU: "${NODE_MTU:-1280}"        # interface MTU; 1280 leaves headroom for turn-proxy obfuscation
      NODE_PLAIN_WG: "${NODE_PLAIN_WG:-}"  # yes = plain WireGuard; blank/no = AmneziaWG v2
      TLS_VERIFY: "${TLS_VERIFY:-no}"     # yes to verify the panel's cert (real CA)
      DNS: "${DNS:-1.1.1.1}"
      # turn-proxies run as host systemd services; the installer writes their record into
      # ./data/node (mounted below), and swg-noded reads it here to report them to the panel.
      SWG_TURN_RECORD: "/var/lib/swg-noded/turn-proxy.json"
    volumes:
      - ./data/node:/var/lib/swg-noded
      # Full AmneziaWG server conf(s) with your own obfuscation params. Every file
      # mounted under /etc/swg-node/*.conf becomes a managed interface:
      # - ./awg0.conf:/etc/swg-node/awg0.conf:ro
      # - ./wg1.conf:/etc/swg-node/wg1.conf:ro
